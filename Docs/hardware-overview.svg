<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="hwtitle hwdesc">
<title id="hwtitle">Komplete Kontrol S25 MK1 hardware overview</title>
<desc id="hwdesc">Diagram of the supported S25 MK1 surface: light guide, nine displays, eight encoders, buttons, touch strips, USB endpoints, and daemon paths.</desc>
<style>
  .bg { fill: #0f1215; }
  .body { fill: #1a2027; stroke: #53606b; stroke-width: 2; }
  .panel { fill: #10151b; stroke: #323f4b; stroke-width: 1.4; }
