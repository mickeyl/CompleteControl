<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="hwtitle hwdesc">
<title id="hwtitle">Komplete Kontrol S25 MK1 hardware overview</title>
<desc id="hwdesc">Diagram of the supported S25 MK1 surface: light guide, displays, encoders, buttons, touch strips, USB endpoints, and daemon paths.</desc>
<style>
  .bg { fill: #0f1215; }
  .body { fill: #1a2027; stroke: #53606b; stroke-width: 2; rx: 16; }
  .panel { fill: #10151b; stroke: #323f4b; stroke-width: 1.4; rx: 8; }
  .keyw { fill: #f0f1ef; stroke: #20252b; stroke-width: 1; }
  .keyb { fill: #0a0c0e; stroke: #4a545f; stroke-width: 1; }
  .lcd { fill: #151b20; stroke: #66d9ef; stroke-width: 1.4; rx: 4; }
  .bar { fill: #f6d365; opacity: 0.75; }
  .enc { fill: #26313a; stroke: #f6d365; stroke-width: 2; }
  .button { fill: #26313a; stroke: #8bd5ff; stroke-width: 1.2; rx: 5; }
  .strip { fill: #07090b; stroke: #92e6a7; stroke-width: 1.5; rx: 6; }
  .text { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dce3e8; }
  .small { font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #aeb8c2; }
  .mono { font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #92e6a7; }
  .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f2f5f7; }
</style>
